<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Enhanced Gradient Showcase Card</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Noto+Sans+SC:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#1e293b",
                        "background-light": "#f1f5f9",
                        "background-dark": "#020617",
                    },
                    fontFamily: {
                        display: ["Inter", "Noto Sans SC", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "0.75rem",
                        '3xl': '2rem',
                        '4xl': '2.5rem',
                    },
                },
            },
        };
    </script>
<style type="text/tailwindcss">
        @layer base {
            body {
                font-family: 'Inter', 'Noto Sans SC', sans-serif;
            }
        }
        .card-shadow {
            box-shadow: 0 20px 50px -12px rgba(0, 0, 0, 0.08);
        }
        .dark .card-shadow {
            box-shadow: 0 20px 50px -12px rgba(0, 0, 0, 0.6);
        }
        .glass-effect {
            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.4);
        }
        .dark .glass-effect {
            backdrop-filter: blur(12px);
            background: rgba(15, 23, 42, 0.4);
        }
        .gradient-mesh {
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex items-center justify-center p-6 transition-colors duration-500">
<div class="max-w-4xl w-full bg-white dark:bg-slate-950 rounded-[3rem] p-1 md:p-1 card-shadow relative overflow-hidden group">
<div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
<div class="absolute -top-[20%] -left-[10%] w-[70%] h-[70%] bg-indigo-200/40 dark:bg-indigo-600/20 rounded-full blur-[100px]"></div>
<div class="absolute top-[10%] -right-[10%] w-[60%] h-[60%] bg-purple-200/30 dark:bg-purple-600/10 rounded-full blur-[120px]"></div>
<div class="absolute -bottom-[20%] left-[20%] w-[50%] h-[50%] bg-blue-100/40 dark:bg-blue-900/20 rounded-full blur-[100px]"></div>
</div>
<div class="relative z-10 p-10 md:p-16">
<div class="inline-flex items-center justify-center w-16 h-16 bg-white dark:bg-slate-800 rounded-2xl mb-10 shadow-sm border border-slate-100 dark:border-slate-700">
<span class="material-symbols-outlined text-indigo-600 dark:text-indigo-400 text-3xl">token</span>
</div>
<h1 class="text-4xl md:text-6xl font-bold text-slate-900 dark:text-white mb-6 tracking-tight">
            标准化
        </h1>
<p class="text-slate-500 dark:text-slate-400 text-lg md:text-2xl leading-relaxed max-w-2xl mb-16">
            在整个套件中使用统一的设计语言。一致的属性、可预测的行为以及零摩擦的开发体验。
        </p>
<div class="glass-effect border border-white/50 dark:border-slate-700/50 rounded-[2.5rem] p-8 md:p-12 shadow-inner">
<div class="flex items-center justify-between mb-8">
<div class="flex items-center gap-3">
<span class="text-slate-600 dark:text-slate-400 font-semibold text-sm md:text-lg tracking-wide">按钮组件</span>
</div>
<div class="flex items-center gap-2 px-3 py-1 bg-emerald-500/10 rounded-full">
<div class="w-2 h-2 bg-emerald-500 rounded-full"></div>
<span class="text-[10px] font-bold text-emerald-600 uppercase tracking-widest">Active</span>
</div>
</div>
<div class="h-px bg-slate-200/50 dark:bg-slate-700/50 mb-12 w-full"></div>
<div class="flex flex-wrap items-center gap-6 md:gap-8">
<button class="bg-slate-900 dark:bg-indigo-600 text-white font-semibold py-4 px-10 rounded-2xl shadow-xl shadow-indigo-500/10 hover:shadow-indigo-500/20 hover:-translate-y-0.5 transition-all active:scale-95 text-base">
                    主要按钮
                </button>
<button class="bg-white/80 dark:bg-slate-800/80 border border-slate-200 dark:border-slate-600 text-slate-700 dark:text-slate-200 font-semibold py-4 px-10 rounded-2xl hover:bg-white dark:hover:bg-slate-700 transition-all text-base shadow-sm">
                    次要按钮
                </button>
<button class="bg-red-50/50 dark:bg-red-950/20 text-red-600 dark:text-red-400 font-semibold py-4 px-10 rounded-2xl hover:bg-red-100 dark:hover:bg-red-900/30 transition-all text-base">
                    警示按钮
                </button>
</div>
</div>
</div>
</div>
<button class="fixed bottom-8 right-8 p-4 bg-white dark:bg-slate-800 rounded-full shadow-2xl border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 hover:scale-110 transition-transform z-50" onclick="document.documentElement.classList.toggle('dark')">
<span class="material-symbols-outlined block dark:hidden">dark_mode</span>
<span class="material-symbols-outlined hidden dark:block">light_mode</span>
</button>

</body></html>
